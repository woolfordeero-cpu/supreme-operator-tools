<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Operator Setup Wizard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --black: #0A0A0A;
    --off-black: #111111;
    --card: #161616;
    --border: #232323;
    --accent: #C8F135;
    --accent-dim: rgba(200, 241, 53, 0.08);
    --accent-mid: rgba(200, 241, 53, 0.18);
    --white: #F5F5F0;
    --muted: #888880;
    --danger: #FF4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--black);
    z-index: 100;
  }

  .header-badge {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(200, 241, 53, 0.2);
    padding: 4px 10px;
    border-radius: 3px;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* MAIN CONTAINER */
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* INTRO SCREEN */
  .intro-screen {
    text-align: center;
    padding: 20px 0 48px;
  }

  .intro-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .intro-headline {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    color: var(--white);
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  .intro-headline span {
    color: var(--accent);
  }

  .intro-sub {
    font-size: 16px;
    line-height: 1.7;
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto 40px;
    font-weight: 400;
  }

  .intro-items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 44px;
    text-align: left;
  }

  .intro-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .intro-item-icon {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .intro-item-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .intro-item-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* PROGRESS BAR */
  .progress-wrapper {
    margin-bottom: 40px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-count {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    margin-bottom: 24px;
  }

  .question-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--white);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .question-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  /* OPTIONS GRID */
  .options-grid {
    display: grid;
    gap: 10px;
  }

  .options-grid.two-col {
    grid-template-columns: 1fr 1fr;
  }

  .option-btn {
    background: var(--off-black);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    line-height: 1.4;
  }

  .option-btn:hover {
    border-color: rgba(200, 241, 53, 0.4);
    background: var(--accent-dim);
    color: var(--white);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: var(--accent-mid);
    color: var(--accent);
  }

  /* TEXT INPUT */
  .text-input {
    width: 100%;
    background: var(--off-black);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    transition: border-color 0.15s ease;
    resize: none;
    outline: none;
  }

  .text-input:focus {
    border-color: rgba(200, 241, 53, 0.5);
  }

  .text-input::placeholder {
    color: #555;
  }

  /* NAVIGATION */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .btn-back {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 24px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-back:hover {
    border-color: var(--muted);
    color: var(--white);
  }

  .btn-next {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 13px 32px;
    color: var(--black);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-left: auto;
  }

  .btn-next:hover {
    background: #d4f545;
    transform: translateY(-1px);
  }

  .btn-next:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  .btn-start {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 16px 44px;
    color: var(--black);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-start:hover {
    background: #d4f545;
    transform: translateY(-2px);
  }

  /* LOADING STATE */
  .loading-screen {
    text-align: center;
    padding: 60px 0;
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 28px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-headline {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 10px;
  }

  .loading-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .loading-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 32px;
    text-align: left;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }

  .loading-step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    transition: color 0.3s ease;
  }

  .loading-step.active {
    color: var(--accent);
  }

  .loading-step.done {
    color: var(--white);
  }

  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s ease;
  }

  .loading-step.active .step-dot {
    background: var(--accent);
  }

  .loading-step.done .step-dot {
    background: var(--white);
  }

  /* OUTPUT SCREEN */
  .output-screen {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    margin-bottom: 36px;
  }

  .output-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .output-headline {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .output-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .output-content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    margin-bottom: 24px;
    white-space: pre-wrap;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.8;
    color: var(--white);
  }

  .output-content h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 28px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .output-content h2:first-child {
    margin-top: 0;
  }

  .output-content h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    margin-top: 20px;
    margin-bottom: 8px;
  }

  .output-content p {
    margin-bottom: 10px;
    color: #ccc;
  }

  .output-content ul {
    padding-left: 20px;
    margin-bottom: 12px;
  }

  .output-content li {
    color: #ccc;
    margin-bottom: 6px;
  }

  .output-content strong {
    color: var(--white);
    font-weight: 600;
  }

  .output-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-copy {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 13px 28px;
    color: var(--black);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-copy:hover {
    background: #d4f545;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 28px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-restart:hover {
    border-color: var(--muted);
    color: var(--white);
  }

  .copy-confirm {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }

  .copy-confirm.show {
    display: flex;
  }

  .error-msg {
    background: rgba(255, 68, 68, 0.08);
    border: 1px solid rgba(255, 68, 68, 0.25);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ff7070;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 16px;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .options-grid.two-col {
      grid-template-columns: 1fr;
    }
    .question-card {
      padding: 24px 20px;
    }
    .output-content {
      padding: 24px 20px;
    }
    .header {
      padding: 16px 20px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-badge">AI Tool</span>
  <span class="header-title">The Operator Setup Wizard</span>
</div>

<div class="container" id="app"></div>

<script>
const QUESTIONS = [
  {
    id: 'wake_time',
    text: 'What time do you currently wake up most days?',
    hint: 'Be honest — not what you wish you did, what you actually do.',
    type: 'options',
    options: ['Before 5:30am', '5:30–6:30am', '6:30–7:30am', '7:30–9am', 'After 9am or inconsistent']
  },
  {
    id: 'work_type',
    text: 'What does the majority of your work actually look like?',
    hint: 'Choose the one that represents most of your productive hours.',
    type: 'options',
    options: [
      'Deep creative or strategic work (writing, building, designing)',
      'Business development and outreach (sales, networking, partnerships)',
      'Content creation (video, writing, social media)',
      'Learning and skill development',
      'Mixed — no single type dominates'
    ]
  },
  {
    id: 'work_hours',
    text: 'How many focused hours per day are you currently getting on your most important work?',
    hint: 'Focused means no phone, no distractions — genuinely deep output.',
    type: 'options',
    options: ['Less than 1 hour', '1–2 hours', '2–4 hours', '4–6 hours', 'More than 6 hours'],
    twoCol: true
  },
  {
    id: 'biggest_killer',
    text: 'What kills your focus most consistently?',
    hint: 'Pick your single biggest execution killer.',
    type: 'options',
    options: [
      'Phone and social media',
      'Low energy or brain fog',
      'Feeling overwhelmed — too many things to do',
      'Procrastination and task avoidance',
      'Environment — noise, interruptions, wrong setup'
    ]
  },
  {
    id: 'sleep_hours',
    text: 'How many hours of sleep are you actually getting per night on average?',
    hint: 'Your biology runs everything downstream. This matters more than anything else.',
    type: 'options',
    options: ['Less than 5 hours', '5–6 hours', '6–7 hours', '7–8 hours', '8+ hours'],
    twoCol: true
  },
  {
    id: 'sleep_quality',
    text: 'How would you rate your sleep quality?',
    hint: 'Not just duration — do you wake up feeling recovered?',
    type: 'options',
    options: ['Poor — I never feel rested', 'Below average — often groggy', 'Average — depends on the night', 'Good — usually feel recovered', 'Excellent — consistently rested'],
  },
  {
    id: 'exercise_current',
    text: 'What does your current exercise routine look like?',
    hint: 'Honest assessment only. This affects your protocol.',
    type: 'options',
    options: [
      'Nothing consistent right now',
      'Light activity — occasional walks',
      'Moderate — 2–3 sessions per week',
      'Active — 4–5 sessions per week',
      'Very active — daily training'
    ]
  },
  {
    id: 'exercise_adherence',
    text: 'Is sticking to an exercise routine something you struggle with?',
    hint: 'This affects when we schedule your training — it matters.',
    type: 'options',
    options: ['Yes — I start and stop consistently', 'Sometimes — depends on motivation', 'No — once I commit I follow through'],
    twoCol: false
  },
  {
    id: 'nutrition_current',
    text: 'How structured is your current approach to nutrition?',
    hint: 'No judgment — this determines how much we need to adjust.',
    type: 'options',
    options: [
      'Unstructured — I eat whatever whenever',
      'Basic — I eat reasonably but no real strategy',
      'Moderate — I track macros or follow loose guidelines',
      'Structured — high protein, meal timing, intentional'
    ]
  },
  {
    id: 'fasting_experience',
    text: 'Have you experimented with intermittent fasting or delaying your first meal?',
    hint: 'This affects your morning protocol and mental clarity strategy.',
    type: 'options',
    options: ['Never tried it', 'Tried it briefly but didn\'t stick', 'Do it occasionally', 'Practice it consistently'],
    twoCol: true
  },
  {
    id: 'supplement_experience',
    text: 'What is your current experience with supplementation?',
    hint: 'This determines how aggressively we phase in your stack.',
    type: 'options',
    options: [
      'None — I take nothing currently',
      'Basic — just protein or a multivitamin',
      'Moderate — a few targeted supplements',
      'Advanced — already running a stack'
    ]
  },
  {
    id: 'work_start_time',
    text: 'What time do you typically start working?',
    hint: 'Your first deep work block gets scheduled from this anchor.',
    type: 'options',
    options: ['Before 6am', '6–7am', '7–8am', '8–9am', '9–10am', 'After 10am'],
    twoCol: true
  },
  {
    id: 'phone_habit',
    text: 'How would you describe your relationship with your phone during work hours?',
    hint: 'Be specific — this determines how aggressive your distraction protocol needs to be.',
    type: 'options',
    options: [
      'It\'s always in my hand or on my desk',
      'I check it every 15–30 minutes',
      'I check it hourly or when I feel stuck',
      'I already keep it away during focused work',
    ]
  },
  {
    id: 'evening_current',
    text: 'What does your evening currently look like before bed?',
    hint: 'Your evening protocol is as important as your morning.',
    type: 'options',
    options: [
      'Screen time right up until I sleep',
      'Wind down loosely but no real protocol',
      'I have some routines but they\'re inconsistent',
      'I have a structured evening protocol already'
    ]
  },
  {
    id: 'biggest_goal',
    text: 'In one sentence — what is the single most important outcome you want from installing this system?',
    hint: 'Write the real answer. This personalizes everything that follows.',
    type: 'text',
    placeholder: 'e.g. I want to consistently ship 6+ hours of deep work every day without crashing...'
  }
];

let currentScreen = 'intro';
let currentQuestion = 0;
let answers = {};
let outputHTML = '';

function render() {
  const app = document.getElementById('app');
  if (currentScreen === 'intro') {
    app.innerHTML = renderIntro();
  } else if (currentScreen === 'questions') {
    app.innerHTML = renderQuestion();
  } else if (currentScreen === 'loading') {
    app.innerHTML = renderLoading();
    runLoadingSequence();
  } else if (currentScreen === 'output') {
    app.innerHTML = renderOutput();
  }
}

function renderIntro() {
  return `
    <div class="intro-screen">
      <div class="intro-eyebrow">The Operator System — AI Tool 1 of 5</div>
      <h1 class="intro-headline">Build Your<br><span>Operating System</span></h1>
      <p class="intro-sub">Answer 15 questions. Get a fully personalized day architecture — supplement timing, deep work blocks, meal strategy, and evening protocol — built around your life and the Operator framework.</p>
      <div class="intro-items">
        <div class="intro-item">
          <div class="intro-item-icon">⚡</div>
          <div class="intro-item-label">Personalized Schedule</div>
          <div class="intro-item-desc">A time-blocked day built around your actual life</div>
        </div>
        <div class="intro-item">
          <div class="intro-item-icon">🧬</div>
          <div class="intro-item-label">Biological Protocol</div>
          <div class="intro-item-desc">Sleep, nutrition, exercise, and supplement timing</div>
        </div>
        <div class="intro-item">
          <div class="intro-item-icon">🎯</div>
          <div class="intro-item-label">Execution Blueprint</div>
          <div class="intro-item-desc">Deep work blocks, distraction protocol, and evening prep</div>
        </div>
        <div class="intro-item">
          <div class="intro-item-icon">📋</div>
          <div class="intro-item-label">Notion-Ready</div>
          <div class="intro-item-desc">Formatted to copy directly into your dashboard</div>
        </div>
      </div>
      <button class="btn-start" onclick="startWizard()">Begin Setup →</button>
    </div>
  `;
}

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  const progress = ((currentQuestion) / QUESTIONS.length) * 100;
  const answer = answers[q.id];

  let inputHTML = '';
  if (q.type === 'options') {
    const gridClass = q.twoCol ? 'options-grid two-col' : 'options-grid';
    inputHTML = `<div class="${gridClass}">
      ${q.options.map((opt, i) => `
        <button class="option-btn ${answer === opt ? 'selected' : ''}" onclick="selectOption('${q.id}', this, '${opt.replace(/'/g, "\\'")}')">
          ${opt}
        </button>
      `).join('')}
    </div>`;
  } else if (q.type === 'text') {
    inputHTML = `<textarea class="text-input" id="text-input-${q.id}" rows="3" placeholder="${q.placeholder}" oninput="handleTextInput('${q.id}', this.value)">${answer || ''}</textarea>`;
  }

  const canProceed = answer && answer.trim() !== '';

  return `
    <div class="progress-wrapper">
      <div class="progress-meta">
        <span class="progress-label">Building Your System</span>
        <span class="progress-count">${currentQuestion + 1} / ${QUESTIONS.length}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="question-number">Question ${currentQuestion + 1}</div>
      <div class="question-text">${q.text}</div>
      <div class="question-hint">${q.hint}</div>
      ${inputHTML}
    </div>

    <div class="nav-row">
      ${currentQuestion > 0 ? `<button class="btn-back" onclick="goBack()">← Back</button>` : '<div></div>'}
      <button class="btn-next" id="next-btn" onclick="goNext()" ${canProceed ? '' : 'disabled'}>
        ${currentQuestion === QUESTIONS.length - 1 ? 'Generate My System →' : 'Next →'}
      </button>
    </div>
  `;
}

function renderLoading() {
  return `
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-headline">Building Your Operating System</div>
      <div class="loading-sub">Analyzing your inputs against the Operator framework.<br>This takes about 20–30 seconds.</div>
      <div class="loading-steps">
        <div class="loading-step active" id="step-1"><div class="step-dot"></div>Analyzing your biological baseline</div>
        <div class="loading-step" id="step-2"><div class="step-dot"></div>Mapping your schedule architecture</div>
        <div class="loading-step" id="step-3"><div class="step-dot"></div>Calibrating supplement timing</div>
        <div class="loading-step" id="step-4"><div class="step-dot"></div>Building your distraction protocol</div>
        <div class="loading-step" id="step-5"><div class="step-dot"></div>Assembling your full system</div>
      </div>
    </div>
  `;
}

function renderOutput() {
  return `
    <div class="output-screen">
      <div class="output-header">
        <div class="output-eyebrow">Your Personalized System</div>
        <div class="output-headline">Your Operator Blueprint</div>
        <div class="output-sub">Copy this into your Notion dashboard. This is your starting homogenized day — refine it weekly using the Weekly Review Ritual from Section 3.</div>
      </div>
      <div class="output-content" id="output-content">${outputHTML}</div>
      <div class="output-actions">
        <button class="btn-copy" onclick="copyOutput()">Copy to Clipboard</button>
        <button class="btn-restart" onclick="restartWizard()">Start Over</button>
        <span class="copy-confirm" id="copy-confirm">✓ Copied to clipboard</span>
      </div>
    </div>
  `;
}

function startWizard() {
  currentScreen = 'questions';
  currentQuestion = 0;
  render();
}

function selectOption(qId, btn, value) {
  answers[qId] = value;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.disabled = false;
}

function handleTextInput(qId, value) {
  answers[qId] = value;
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.disabled = value.trim() === '';
}

function goNext() {
  const q = QUESTIONS[currentQuestion];
  if (!answers[q.id] || answers[q.id].trim() === '') return;

  if (currentQuestion === QUESTIONS.length - 1) {
    currentScreen = 'loading';
    render();
  } else {
    currentQuestion++;
    render();
  }
}

function goBack() {
  if (currentQuestion > 0) {
    currentQuestion--;
    render();
  }
}

function runLoadingSequence() {
  const steps = [1, 2, 3, 4, 5];
  let current = 0;

  const interval = setInterval(() => {
    if (current > 0) {
      const prev = document.getElementById(`step-${current}`);
      if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
    }
    current++;
    if (current <= steps.length) {
      const curr = document.getElementById(`step-${current}`);
      if (curr) curr.classList.add('active');
    }
    if (current > steps.length) clearInterval(interval);
  }, 1200);

  generateOutput();
}

async function generateOutput() {
  const a = answers;

  const wakeTime = a['wake_time'] || 'unspecified';
  const workStart = a['work_start_time'] || 'unspecified';
  const workType = a['work_type'] || 'unspecified';
  const focusHours = a['work_hours'] || 'unspecified';
  const focusKiller = a['biggest_killer'] || 'unspecified';
  const sleepHours = a['sleep_hours'] || 'unspecified';
  const sleepQuality = a['sleep_quality'] || 'unspecified';
  const exercise = a['exercise_current'] || 'unspecified';
  const adherence = a['exercise_adherence'] || 'unspecified';
  const nutrition = a['nutrition_current'] || 'unspecified';
  const fasting = a['fasting_experience'] || 'unspecified';
  const supplements = a['supplement_experience'] || 'unspecified';
  const phone = a['phone_habit'] || 'unspecified';
  const evening = a['evening_current'] || 'unspecified';
  const goal = a['biggest_goal'] || 'unspecified';

  const systemPrompt = `You are the AI engine behind The Operator System — a premium performance course built around three layers: biological optimization, psychological operating system, and execution architecture.

COURSE FRAMEWORK:

BIOLOGICAL LAYER:
- Sleep: 8 hours, consistent schedule, 65-68F room, pitch black, 1-hour wind-down, blue light cut 1-2 hours before bed
- Morning light: within first 30 minutes of waking, minimum 10 minutes outdoor exposure
- Nutrition: morning carb restriction for mental clarity, intermittent fasting recommended, high protein, large meals impair cognition via blood flow diversion, strategic carbs + tryptophan in evening (Greek yogurt) for serotonin
- Exercise: morning walk non-negotiable (sunlight + movement + lymphatic drainage), intense exercise end of day by default. EXCEPTION: if adherence is a struggle, morning training beats no training. Find the dose that maximizes output without draining it.
- Cold exposure: cold plunge or shower 5+ minutes as reactive tool for low-motivation days
- Hydration: electrolytes first thing in morning
- Nose breathing: during all work sessions
- Supplements: morning stack (stimulants, dopaminergics, mitochondrial), late morning optional (ashwagandha, saffron, L-theanine), anytime (foundation health), evening stack (magnesium, serotonergics, sleep). Caffeine + nicotine: 5 days on / 2 days off.

EXECUTION LAYER:
- Weekly homogenization: design one optimal day, replicate across every workday, refine weekly not daily
- Morning-first: highest consequence task before anything reactive (Eat That Frog)
- Deep work blocks: 90-minute ultradian-aligned blocks, single task, no phone, pre-session ritual
- Energy-matched scheduling: hard cognitive work in peak morning windows, admin in low-energy afternoon
- Phone protocol: physical removal during deep work, all notifications off, remove social apps from home screen, 3 designated check windows only (mid-morning / post-lunch / end of day), app blocking during sessions
- Workspace: 68-73F, cool daylight-temperature lighting, dedicated space used only for work, desk cleared
- Output-based measurement: define clear outputs, not time spent
- Evening ritual: workspace reset, next day task written, supplements prepped, breakfast prepped, clothes selected, devices charging outside bedroom, blue light off, red light use, stop eating 2 hours before bed, pitch black room, temperature optimized
- Early wake: own the morning before the world does
- Weekly review: once per week — what worked, what didn't, biggest bottleneck, has drift occurred

OUTPUT FORMAT:
Generate a clean structured HTML document. Use <h2> for the 6 section headers. Use <h3> for subsections. Use <p> and <ul><li> for content. Be specific and personal. Address the student as "you". Reference their answers directly where relevant. Write like a high-performance coach giving a real prescription — not generic advice.

You must complete ALL six sections fully. Do not stop until every section is closed. The six sections are:
1. YOUR OPERATOR PROFILE
2. YOUR HOMOGENIZED DAY
3. BIOLOGICAL PROTOCOL
4. SUPPLEMENT ENTRY POINT
5. DISTRACTION PROTOCOL
6. HIGHEST LEVERAGE STARTING POINT`;

  const userPrompt = `Generate my personalized Operator Blueprint based on these answers:

- Wake time: ${wakeTime}
- Work start time: ${workStart}
- Work type: ${workType}
- Current focused hours/day: ${focusHours}
- Biggest focus killer: ${focusKiller}
- Sleep hours: ${sleepHours}
- Sleep quality: ${sleepQuality}
- Current exercise: ${exercise}
- Exercise adherence struggles: ${adherence}
- Nutrition approach: ${nutrition}
- Fasting experience: ${fasting}
- Supplement experience: ${supplements}
- Phone habit during work: ${phone}
- Evening routine: ${evening}
- Primary goal: ${goal}

SECTION REQUIREMENTS:
1. YOUR OPERATOR PROFILE — 2-3 sentences on my current state and what this system will do for me specifically.
2. YOUR HOMOGENIZED DAY — Full time-blocked schedule from wake to sleep. Every block labeled with specific times based on my wake time (${wakeTime}) and work start (${workStart}). Must include: wake + morning protocol, electrolytes, morning walk, light exposure, morning stack timing, first deep work block (Eat That Frog), mid-morning check window, late morning add-ons, lunch window, afternoon admin block, afternoon deep work block if applicable, exercise placement (calibrated to my adherence: ${adherence}), evening ritual start, supplement evening stack, sleep target.
3. BIOLOGICAL PROTOCOL — Personalized prescriptions for sleep (specific to my quality: ${sleepQuality}), morning light, nutrition (calibrated to my current approach: ${nutrition} and fasting experience: ${fasting}), exercise (calibrated to adherence: ${adherence}), hydration, cold exposure.
4. SUPPLEMENT ENTRY POINT — Starting stack recommendation based on my experience level (${supplements}). Beginners: foundation layer + 1-2 cognitive adds. Moderate: foundation + basic morning dopaminergic stack. Advanced: full morning stack. End with a note to use the Supplement Stack Personalizer tool for full customization.
5. DISTRACTION PROTOCOL — All 5 layers prescribed and calibrated to my phone habit (${phone}). Name specific actions to take today.
6. HIGHEST LEVERAGE STARTING POINT — The single most impactful change I should make in the first 7 days. One clear directive only. No list.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 16000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.map(c => c.text || '').join('') || '';

    outputHTML = rawText.replace(/```html|```/g, '').trim();

    if (!outputHTML) throw new Error('Empty response');

    currentScreen = 'output';
    render();

  } catch (err) {
    currentScreen = 'output';
    outputHTML = `<div class="error-msg">Something went wrong generating your blueprint. Error: ${err.message}. Please try refreshing and running the wizard again.</div>`;
    render();
  }
}



function copyOutput() {
  const content = document.getElementById('output-content');
  const text = content ? content.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    const confirm = document.getElementById('copy-confirm');
    if (confirm) {
      confirm.classList.add('show');
      setTimeout(() => confirm.classList.remove('show'), 3000);
    }
  });
}

function restartWizard() {
  currentScreen = 'intro';
  currentQuestion = 0;
  answers = {};
  outputHTML = '';
  render();
}

render();
</script>
</body>
</html>
